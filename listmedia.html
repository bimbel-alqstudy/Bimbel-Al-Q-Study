<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bimbingan Belajar Al-Q Study | Media</title>

<link rel="shortcut icon" href="gambar/logo.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/latihan.css">

</head>
<body>
  <div class="menu-overlay" id="menuOverlay"></div>

<header id="siteHeader"></header>

<!-- HEADER HALAMAN -->
<section class="page-header">
<div class="container">

<!-- Breadcrumb -->
<div id="breadcrumb" class="breadcrumb"></div>
<!-- Judul -->
<h1 id="judulHalaman"></h1>
  
<!-- Deskripsi -->
<p id="deskripsiHalaman"></p>
</div>
</section>

<!-- DAFTAR LATIHAN -->
<section class="latihan-section">
<div class="container">

<div class="filter-wrapper">
  <div class="filter-group">
    <label>Pilih Kategori</label>
    <select id="filterKategori"></select>
  </div>
  <div class="filter-group">
    <label>Cari </label>
    <input type="text" id="searchGame" placeholder="Cari ...">
 </div>
</div>  
<div id="daftarMedia" class="latihan-list">
<!-- Data latihan di-render oleh JavaScript -->
</div>
<div id="paginationGame" class="pagination"></div>
</div>
</section>

  <div class="section-divider"></div>

<!-- ===== ORNAMEN GELOMBANG ===== -->
<div style="background:linear-gradient(180deg, var(--blue), var(--green));">
<svg viewBox="0 0 1440 50" preserveAspectRatio="none" style="width:100%; height:45px; display:block;">
  <path fill="#2ECC71" fill-opacity="0.38"
    d="M0,40 C120,70 240,10 360,20 480,30 600,80 720,75 840,70 960,30 1080,20 1200,10 1320,30 1440,40 L1440,0 L0,0 Z">
  </path>
</svg>
</div>

  <!-- FOOTER -->
<footer id="siteFooter" class="footer"></footer>

<script src="js/breadcrumb.js" defer></script>
<script src="js/media.js" defer></script>
<script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</body>
</html>
