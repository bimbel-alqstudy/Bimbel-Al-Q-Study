<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Bimbingan Belajar Al-Q Study | Viewer PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="shortcut icon" href="gambar/logo.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/SD.css">
<style>
    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
    }

    .error {
      padding: 20px;
      text-align: center;
      color: red;
    }
  .btn-download {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #27ae60;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}
  height: calc(100vh - 180px);
  </style>
</head>
<body>
<div class="menu-overlay" id="menuOverlay"></div>
<header id="siteHeader"></header>

<!-- HEADER HALAMAN -->
<section class="page-header">
<div class="container">

<!-- Breadcrumb -->
  <nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Judul -->
<h1 id="judul"></h1>

<!-- Deskripsi -->
<p class="page-desc">
Kumpulan materi pelajaran, bank soal, dan latihan online untuk siswa Sekolah Dasar (SD).
</p>
<a id="downloadBtn" class="btn-download" target="_blank">
  <i class="fa-solid fa-download"></i> Download PDF
</a>
</div>
</section>

  <div class="container">
<iframe id="pdfViewer"></iframe>
<div class="error" id="error" style="display:none;">
  Gagal memuat PDF.
</div>
 <a href="javascript:history.back()" class="btn-back">← Kembali</a>   
</div>

    <div class="section-divider"></div>

<!-- ===== ORNAMEN GELOMBANG ===== -->
<div style="background:linear-gradient(180deg, var(--blue), var(--green));">
<svg viewBox="0 0 1440 50" preserveAspectRatio="none" style="width:100%; height:45px; display:block;">
  <path fill="#2ECC71" fill-opacity="0.38"
    d="M0,40 C120,70 240,10 360,20 480,30 600,80 720,75 840,70 960,30 1080,20 1200,10 1320,30 1440,40 L1440,0 L0,0 Z">
  </path>
</svg>
</div>

  <!-- FOOTER -->
<footer id="siteFooter" class="footer"></footer>

  <script src="js/header.js"></script>
<script src="js/breadcrumb.js"></script>
  <script src="js/footer.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const file = params.get("file");
const judul = params.get("judul");

const viewer = document.getElementById("pdfViewer");
const judulEl = document.getElementById("judul");
const errorEl = document.getElementById("error");

if (file) {
  viewer.src = file;
  judulEl.textContent = decodeURIComponent(judul || "Dokumen");
} else {
  viewer.style.display = "none";
  errorEl.style.display = "block";
}

const downloadBtn = document.getElementById("downloadBtn");

let fileId = "";
if (file && file.includes("/d/")) {
  fileId = file.split("/d/")[1].split("/")[0];
}

if (fileId) {
  downloadBtn.href = `https://drive.google.com/uc?export=download&id=${fileId}`;
}  
const kelas = params.get("kelas");
const type = params.get("type");

function getJenjang(kelas) {
  if (kelas >= 1 && kelas <= 6) return "SD";
  if (kelas >= 7 && kelas <= 9) return "SMP";
  if (kelas >= 10 && kelas <= 12) return "SMA";
  return "";
}

const jenjang = getJenjang(parseInt(kelas));
const typeLabel = {
  materi: "Materi",
  latihan: "Bank Soal",
  tryout: "Latihan Online"
};
const labelType = typeLabel[type] || "Halaman";  
renderBreadcrumb([
  { label: "Beranda", link: "index.html" },
  { label: jenjang, link: `${jenjang.toLowerCase()}.html` },
  { label: `Kelas ${kelas}`, link: `kelas.html?kelas=${kelas}` },
  { label: labelType, link: `latihan.html?kelas=${kelas}&type=${type}` },
  { label: decodeURIComponent(judul || "Dokumen") }
]);
</script>

</body>
</html>
