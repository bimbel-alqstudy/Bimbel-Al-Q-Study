<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Bimbingan Belajar Al-Q Study</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="shortcut icon" href="gambar/logo.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/SD.css">
<style>
    .error {
      padding: 20px;
      text-align: center;
      color: red;
    }
  .btn-download {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  background: #27ae60;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}
.btn-download:hover {
  opacity: 0.85;
}

  .pdf-container {
  max-width: 1000px;
  margin: 20px auto;
  background: #f5f6fa;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: all 0.3s ease;  
}

.pdf-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2c3e50;
  color: white;
  padding: 10px 15px;
}

.pdf-toolbar .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pdf-toolbar .right a {
  margin-left: 10px;
  background: #27ae60;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.pdf-toolbar button {
  margin-left: 10px;
  background: #3498db;
  padding: 6px 10px;
  border-radius: 5px;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.pdf-toolbar button:hover {
  opacity: 0.85;
}
iframe {
  width: 100%;
  height: 180vh;
  border: none;
  background: #fff;
}
.pdf-container:fullscreen {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.pdf-container:fullscreen iframe {
  flex: 1;
  height: 100%;
}  
  </style>
</head>
<body>
<div class="menu-overlay" id="menuOverlay"></div>
<header id="siteHeader"></header>

<!-- HEADER HALAMAN -->
<section class="page-header">
<div class="container">

<!-- Breadcrumb -->
  <nav class="breadcrumb" id="breadcrumb"></nav>

<!-- Judul -->
<h1 id="judul"></h1>
<h1 id="subjudul"></h1>

</div>
</section>

  <div class="container">
    
<div class="pdf-container">
<div class="pdf-toolbar">
<div class="right">
  <button id="btnFullscreen">Fullscreen</button>
      <a id="downloadBtn" class="btn-download" target="_blank">
        <i class="fa-solid fa-download"></i>Download
      </a>
    </div>
</div>    
    <!-- Viewer -->
  <iframe id="pdfViewer"></iframe>

</div>    
<div class="error" id="error" style="display:none;">
  Gagal memuat PDF.
</div> 
</div>

    <div class="section-divider"></div>

<!-- ===== ORNAMEN GELOMBANG ===== -->
<div style="background:linear-gradient(180deg, var(--blue), var(--green));">
<svg viewBox="0 0 1440 50" preserveAspectRatio="none" style="width:100%; height:45px; display:block;">
  <path fill="#2ECC71" fill-opacity="0.38"
    d="M0,40 C120,70 240,10 360,20 480,30 600,80 720,75 840,70 960,30 1080,20 1200,10 1320,30 1440,40 L1440,0 L0,0 Z">
  </path>
</svg>
</div>

  <!-- FOOTER -->
<footer id="siteFooter" class="footer"></footer>

  <script src="js/header.js"></script>
<script src="js/breadcrumb.js"></script>
  <script src="js/footer.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");
const kelas = params.get("kelas");
const mapel = params.get("mapel");
const bab = params.get("bab");
const file = params.get("file");
const judul = params.get("judul");
const download = params.get("download");
const viewer = document.getElementById("pdfViewer");
const judulEl = document.getElementById("judul");
const subjudulEl = document.getElementById("subjudul");
const downloadBtn = document.getElementById("downloadBtn");
const parts = [mapel, bab, judul].filter(Boolean);
const fullJudul = parts.join(" - ");    
if (file) {
//  const decodedJudul = decodeURIComponent(judul || "Dokumen");

  // tampilkan judul
  if (type==="materi" ){
  judulEl.textContent = `Bank Soal Kelas ${kelas}`;
  } else {  judulEl.textContent = `Soal Latihan Kelas ${kelas}`;
}
  subjudulEl.textContent = fullJudul;

  // set iframe (WAJIB pakai preview)
  viewer.src = file;

  // ambil file ID
//  const fileId = file.split("/d/")[1].split("/")[0];

  // tombol download
  downloadBtn.href = download;
} else {
  viewer.style.display = "none";
}    

const btnFullscreen = document.getElementById("btnFullscreen");

// 🔲 FULLSCREEN
if (btnFullscreen) {
  btnFullscreen.addEventListener("click", () => {
    const container = document.querySelector(".pdf-container");

    if (!document.fullscreenElement) {
      container.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });
}

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    btnFullscreen.textContent = "Fullscreen";
  } else {
    btnFullscreen.textContent = "Exit Fullscreen";
  }
});
    
function getJenjang(kelas) {
  if (kelas >= 1 && kelas <= 6) return "SD";
  if (kelas >= 7 && kelas <= 9) return "SMP";
  if (kelas >= 10 && kelas <= 12) return "SMA";
  return "";
}
const jenjang = getJenjang(parseInt(kelas));

function getLabel(type) {
  if (type==="materi") return "Materi";
  if (type==="latihan") return "Bank Soal";
  return "";
}
const Label = getLabel(type);    
    renderBreadcrumb([
  { label: "Beranda", link: "index.html" },
  { label: jenjang, link: `${jenjang}.html` },
  { label: `Kelas ${kelas}`, link: `kelas.html?kelas=${kelas}` },
  { label: Label, link: `latihan.html?kelas=${kelas}&type=${type}` },
  { label: fullJudul || "Dokumen" }
]);
</script>

</body>
</html>
